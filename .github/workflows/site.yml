name: Build, refresh & deploy

# Two triggers, one job:
#   • push to main / manual  → always rebuild & deploy the site (e.g. after a code change)
#   • schedule (every 5 min, Jun–Jul) → refresh live data during the tournament window;
#     deploy ONLY if the data actually changed (skips ~288 no-op deploys/day otherwise)
#
# Pages is published from THIS workflow (set Settings → Pages → Source: GitHub Actions).
# That sidesteps both the ~10-builds/hour cap (exempt for custom Actions) and the fact
# that GITHUB_TOKEN commits don't trigger the separate pages-build-deployment workflow.

on:
  push:
    branches: [main]
  schedule:
    - cron: "*/5 * * 6,7 *"   # June+July only (schedule.js gates finer); 5 min is GitHub's floor, expect drift
  workflow_dispatch:

permissions:
  contents: write   # commit refreshed data
  pages: write      # deploy Pages
  id-token: write   # deploy Pages (OIDC)
  actions: write    # re-dispatch self during live matches (near-live cadence)

concurrency:
  group: site
  cancel-in-progress: false   # never interrupt a deploy/commit mid-flight

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      # ── Data refresh (schedule/manual only; skipped on plain pushes) ──
      - name: Live-window guard
        id: guard
        if: github.event_name != 'push'
        run: |
          # don't let echo mask a guard crash — a silent failure here would disable refresh forever
          active=$(node scripts/schedule.js) || { echo "::error::schedule.js failed"; exit 1; }
          echo "active=$active" >> "$GITHUB_OUTPUT"

      - name: Refresh match data
        id: refresh
        if: github.event_name != 'push' && steps.guard.outputs.active == 'true'
        continue-on-error: true   # a feed/adapter failure must not block deploying the site
        run: node scripts/refresh.js

      # continue-on-error keeps the deploy unblocked, but a swallowed failure must not be
      # invisible — a sustained feed outage would otherwise leave every run green. Surface it
      # loudly (annotation + job summary) while still serving last-good data.
      - name: Flag a swallowed refresh failure
        if: steps.refresh.outcome == 'failure'
        run: |
          echo "::warning title=Live data refresh failed::scripts/refresh.js exited non-zero — the match feed/adapter likely failed. Serving last-good data; the deploy still proceeds."
          echo "⚠️ **Live data refresh failed** — match feed/adapter error; serving last-good data (deploy still proceeded). Check the *Refresh match data* step log." >> "$GITHUB_STEP_SUMMARY"

      - name: Commit data if it changed
        id: commit
        if: github.event_name != 'push'
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/ 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "data: refresh $(date -u +%FT%TZ)"
            for i in 1 2 3; do
              git push && break || { echo "push failed, rebasing…"; git pull --rebase --autostash origin "${GITHUB_REF_NAME}"; sleep $((2**i)); }
            done
            # the retry loop can end on a successful sleep — make total failure loud, not silent
            git push || { echo "::error::push failed after retries — not deploying unpushed data"; exit 1; }
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "no data change"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      # ── Build & deploy ──
      # Scheduled runs deploy only when the data actually changed; pushes & manual runs always deploy.
      - name: Validate canonical data
        if: github.event_name != 'schedule' || steps.commit.outputs.changed == 'true'
        run: node scripts/check-data.js

      - name: Assemble site
        if: github.event_name != 'schedule' || steps.commit.outputs.changed == 'true'
        run: |
          rm -rf _site && mkdir _site
          cp index.html _site/
          cp -r data _site/data

      - uses: actions/configure-pages@v5
        if: github.event_name != 'schedule' || steps.commit.outputs.changed == 'true'
      - uses: actions/upload-pages-artifact@v3
        if: github.event_name != 'schedule' || steps.commit.outputs.changed == 'true'
        with:
          path: _site

      # The original outage was a repo *setting* drifting out of sync with this workflow:
      # Pages "Deploy from a branch" (legacy) racing this Actions deploy for the single Pages
      # lock. Settings aren't version-controlled, so warn loudly (never block) if it regresses.
      - name: Assert Pages uses the Actions builder
        if: github.event_name != 'schedule' || steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          bt=$(gh api "repos/${GITHUB_REPOSITORY}/pages" --jq .build_type 2>/dev/null || echo unknown)
          [ "$bt" = "workflow" ] || echo "::warning title=Pages source drifted::build_type='$bt' (expected 'workflow'); the legacy builder will race this deploy — set Settings → Pages → Source to GitHub Actions (see README)."

      - id: deploy
        if: github.event_name != 'schedule' || steps.commit.outputs.changed == 'true'
        uses: actions/deploy-pages@v4

      # ── Near-live cadence (opt-in) ──
      # GitHub throttles the */5 cron to ~30-40 min, so during a live match the run
      # re-dispatches itself (~2-min loop) to refresh far more often than cron allows.
      # Fully opt-in: with no LIVE_DISPATCH_PAT secret this is a no-op and we just rely on
      # cron. GITHUB_TOKEN can't self-trigger workflow_dispatch, hence a PAT (actions:write).
      # The chain self-terminates the moment no match is live.
      - name: Keep refreshing while a match is live
        if: github.event_name != 'push'
        env:
          PAT: ${{ secrets.LIVE_DISPATCH_PAT }}
        run: |
          [ -z "$PAT" ] && { echo "no LIVE_DISPATCH_PAT — relying on cron cadence"; exit 0; }
          node -e 'let d={};try{d=require("./data/matches.json")}catch(e){};process.exit([...(d.matches||[]),...(d.knockouts||[])].some(m=>m.status==="live")?0:1)' \
            || { echo "nothing live — not chaining"; exit 0; }
          sleep 60   # pace the chain to ~2 min (this run + ~60s) instead of hammering
          curl -sf -X POST \
            -H "Authorization: token $PAT" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/workflows/site.yml/dispatches" \
            -d '{"ref":"main"}' && echo "re-dispatched for next live tick" || echo "::warning::re-dispatch failed"
